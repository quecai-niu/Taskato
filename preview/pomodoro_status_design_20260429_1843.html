<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>番茄钟状态标签设计提案 - Taskato</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --primary-color: #6366f1;
            --secondary-color: #a855f7;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
            margin: 0;
        }

        h1 { margin-bottom: 40px; font-weight: 300; letter-spacing: 1px; }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            max-width: 900px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 300px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .card::before {
            content: "Pomodoro Section";
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .label {
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* --- 方案 01: 极简悬浮 (Minimal Glass) --- */
        .status-01 {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 100px;
            padding: 4px 14px;
            font-size: 11px;
            font-weight: 600;
            color: #a78bfa;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }
        .status-01::before {
            content: "";
            width: 6px;
            height: 6px;
            background: #a78bfa;
            border-radius: 50%;
            box-shadow: 0 0 8px #a78bfa;
        }
        .card:hover .status-01 {
            background: rgba(99, 102, 241, 0.25);
            transform: translateY(-2px);
        }

        /* --- 方案 02: 霓虹辉光 (Neon Pulse) --- */
        .status-02 {
            background: #1e1b4b;
            border: 1px solid transparent;
            background-image: linear-gradient(#1e1b4b, #1e1b4b), linear-gradient(to right, #6366f1, #a855f7);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            border-radius: 100px;
            padding: 5px 16px;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.8);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }

        /* --- 方案 03: 现代渐变 (Modern Gradient Pill) --- */
        .status-03 {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 8px;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 800;
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            text-transform: uppercase;
            transform: skew(-10deg);
        }
        .status-03 span {
            display: inline-block;
            transform: skew(10deg);
        }

        /* --- 方案 04: 动态流光 (Liquid Border) --- */
        .status-04 {
            position: relative;
            background: #0f172a;
            padding: 5px 16px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }
        .status-04::after {
            content: "";
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            background: linear-gradient(90deg, #6366f1, #a855f7, #6366f1);
            background-size: 200% 100%;
            border-radius: 100px;
            z-index: -1;
            animation: moveGradient 3s linear infinite;
        }
        @keyframes moveGradient {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        .preview-area {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>番茄钟状态标签 - 视觉提案</h1>
    
    <div class="container">
        <!-- 方案 01 -->
        <div class="card">
            <div class="preview-area">
                <div class="status-01">专注中</div>
            </div>
            <div class="label">方案 01: 极简悬浮 (Minimal Glass)</div>
        </div>

        <!-- 方案 02 -->
        <div class="card">
            <div class="preview-area">
                <div class="status-02">工作中</div>
            </div>
            <div class="label">方案 02: 霓虹辉光 (Neon Pulse)</div>
        </div>

        <!-- 方案 03 -->
        <div class="card">
            <div class="preview-area">
                <div class="status-03"><span>RESTING</span></div>
            </div>
            <div class="label">方案 03: 现代斜切 (Modern Skew)</div>
        </div>

        <!-- 方案 04 -->
        <div class="card">
            <div class="preview-area">
                <div class="status-04">高效模式</div>
            </div>
            <div class="label">方案 04: 动态流光 (Liquid Border)</div>
        </div>
    </div>
</body>
</html>
