<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskato - 多番茄选项卡专属设计</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #12141c; /* 匹配暗色主题背景 */
            --tab-bg: rgba(255, 255, 255, 0.04);
            --tab-border: rgba(255, 255, 255, 0.08);
            --text-main: #F3F4F6;
            --text-muted: #6B7280;
            --primary: #6366F1;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        /* 模拟现有的番茄钟大圆盘（不改变原本设计） */
        .mock-timer-ring {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 64px;
            font-weight: bold;
            color: rgba(255,255,255,0.8);
            margin-bottom: 40px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
        }

        /* 核心焦点：多番茄选项卡区域 (Tab Switcher) */
        .tab-switcher-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tabs-header {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            padding-left: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tabs-scroll-area {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            overflow-x: auto;
            /* 隐藏滚动条 */
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .tabs-scroll-area::-webkit-scrollbar {
            display: none;
        }

        /* 单个选项卡 */
        .tab-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: 16px;
            background: var(--tab-bg);
            border: 1px solid var(--tab-border);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            user-select: none;
            white-space: nowrap;
        }

        .tab-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        /* 选中状态 */
        .tab-item.active {
            background: rgba(99, 102, 241, 0.15);
            border-color: var(--primary);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.2), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .tab-item.active .tab-title {
            color: #fff;
            font-weight: 600;
        }

        .tab-item.active .tab-time {
            color: var(--primary);
        }

        /* 选项卡内部文本 */
        .tab-title {
            font-size: 14px;
            color: var(--text-muted);
            transition: color 0.3s;
        }

        .tab-time {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 10px;
            transition: all 0.3s;
        }

        /* 添加按钮 */
        .btn-add {
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            border-radius: 16px;
            background: transparent;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            color: var(--text-muted);
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add:hover {
            border-style: solid;
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            transform: scale(1.05);
        }

        /* 状态圆点指示器（表示是否有在运行的计时器） */
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 8px var(--primary);
            margin-right: 4px;
            display: none;
        }

        .tab-item.running .status-dot {
            display: block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

    </style>
</head>
<body>

    <!-- 示意原有的番茄钟（不改变这部分设计） -->
    <div class="mock-timer-ring">25:00</div>

    <!-- 专属设计的多番茄选项卡区域 -->
    <div class="tab-switcher-container">
        <div class="tabs-header">番茄钟队列 (Pomodoro Queue)</div>
        <div class="tabs-scroll-area">
            <!-- 激活状态的选项卡 -->
            <div class="tab-item active running" onclick="switchTab(this)">
                <div class="status-dot"></div>
                <span class="tab-title">主番茄钟</span>
                <span class="tab-time">25:00</span>
            </div>
            
            <!-- 附加的子番茄钟 -->
            <div class="tab-item" onclick="switchTab(this)">
                <span class="tab-title">阅读任务</span>
                <span class="tab-time">45:00</span>
            </div>
            
            <div class="tab-item" onclick="switchTab(this)">
                <span class="tab-title">碎片工作</span>
                <span class="tab-time">15:00</span>
            </div>

            <!-- 添加新番茄钟按钮 -->
            <div class="btn-add" title="添加新番茄钟">+</div>
        </div>
    </div>

    <script>
        function switchTab(clickedEl) {
            document.querySelectorAll('.tab-item').forEach(el => {
                el.classList.remove('active');
            });
            clickedEl.classList.add('active');
        }
    </script>
</body>
</html>
